name: CI/CD PlatformAlert

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Configurer Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Login Docker Hub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4️⃣ Build et push l'image API
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/platformalert-api:latest

      # 5️⃣ Build et push l'image Scraper
      - name: Build and push Scraper image
        uses: docker/build-push-action@v5
        with:
          context: ./scraper
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/platformalert-scraper:latest

      # 6️⃣ Scan des images avec Trivy
      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/platformalert-api:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Scan Scraper image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/platformalert-scraper:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
