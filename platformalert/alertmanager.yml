global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'email-alert'

receivers:
  - name: 'email-alert'
    email_configs:
      - to: 'adjovififame@gmail.com'
        from: 'alertmanager@platformalert.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'adjovififame@gmail.com'
        auth_password: '${GMAIL_APP_PASSWORD}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
