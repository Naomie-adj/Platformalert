name: CI/CD PlatformAlert
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./platformalert/api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/platformalert-api:latest

      - name: Build and push Scraper image
        uses: docker/build-push-action@v6
        with:
          context: ./platformalert/scraper
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/platformalert-scraper:latest

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/platformalert-api:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan Scraper image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/platformalert-scraper:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
