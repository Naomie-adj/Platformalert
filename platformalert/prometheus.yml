global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API PlatformAlert
  - job_name: 'platformalert-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  # Scraper PlatformAlert
  - job_name: 'platformalert-scraper'
    static_configs:
      - targets: ['scraper:9100']
    metrics_path: '/metrics'
